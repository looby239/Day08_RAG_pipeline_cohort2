<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent RAG Observatory</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(15, 28, 47, .84);
      --panel-2: #111f34;
      --line: #314159;
      --text: #edf5ff;
      --muted: #8ea2ba;
      --blue: #35b7ff;
      --green: #37e6a1;
      --amber: #ffbd45;
      --red: #ff647c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font: 14px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 5%, #12335a 0, transparent 28%),
        radial-gradient(circle at 90% 80%, #182955 0, transparent 30%),
        var(--bg);
    }
    button, select, textarea { font: inherit; }
    .shell { max-width: 1680px; margin: auto; padding: 22px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: clamp(22px, 3vw, 34px); letter-spacing: -.03em; }
    .subtitle { color: var(--muted); margin-top: 4px; }
    .mode {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border: 1px solid var(--line); border-radius: 12px; background: var(--panel);
    }
    select, textarea {
      color: var(--text); background: #0b1728; border: 1px solid var(--line);
      border-radius: 9px; outline: none;
    }
    select { padding: 8px 10px; }
    .grid { display: grid; grid-template-columns: minmax(300px, .8fr) minmax(620px, 2fr); gap: 18px; }
    .panel {
      background: var(--panel); border: 1px solid rgba(130, 166, 205, .18);
      border-radius: 18px; box-shadow: 0 22px 60px rgba(0,0,0,.28);
      backdrop-filter: blur(14px); overflow: hidden;
    }
    .panel-title {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--line); font-weight: 700;
    }
    .chat { min-height: 420px; max-height: 58vh; overflow: auto; padding: 16px; }
    .bubble { padding: 12px 14px; border-radius: 12px; margin-bottom: 12px; white-space: pre-wrap; }
    .bubble.user { margin-left: 12%; background: #1263a8; }
    .bubble.bot { margin-right: 5%; background: #16283f; border: 1px solid #29415e; }
    .composer { padding: 14px; border-top: 1px solid var(--line); }
    textarea { width: 100%; min-height: 88px; padding: 12px; resize: vertical; }
    .send {
      width: 100%; margin-top: 10px; padding: 11px; border: 0; border-radius: 9px;
      color: white; font-weight: 800; cursor: pointer;
      background: linear-gradient(120deg, #158be1, #7257e8);
    }
    .send:disabled { opacity: .5; cursor: wait; }
    .right { display: grid; grid-template-rows: minmax(680px, 1fr) 390px; gap: 18px; }
    .graph-wrap { position: relative; min-height: 500px; overflow: auto; }
    .graph { position: relative; width: 100%; min-width: 860px; height: 700px; margin: 10px auto; }
    svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; overflow: visible; }
    .edge { fill: none; stroke: #35465e; stroke-width: 3; stroke-dasharray: 8 9; transition: .25s; }
    .edge.live { stroke: var(--blue); filter: drop-shadow(0 0 7px var(--blue)); animation: dash 1s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -34; } }
    .node {
      position: absolute; z-index: 2; width: 190px; min-height: 112px;
      transform: translate(-50%, -50%); padding: 14px; text-align: center;
      border: 1px solid #394b62; border-radius: 14px; background: var(--panel-2);
      transition: .25s; box-shadow: 0 12px 28px rgba(0,0,0,.3);
    }
    .node .icon { font-size: 28px; }
    .node strong { display: block; margin: 4px 0; font-size: 16px; }
    .node .state { color: var(--muted); font-family: Consolas, monospace; font-size: 12px; }
    .node .latency { color: #b8cae0; font-size: 12px; margin-top: 5px; min-height: 18px; }
    .node.running {
      border-color: var(--blue); box-shadow: 0 0 0 2px #35b7ff33, 0 0 28px #35b7ff66;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .node.completed { border-color: var(--green); box-shadow: 0 0 20px #37e6a144; }
    .node.error { border-color: var(--red); box-shadow: 0 0 20px #ff647c55; }
    @keyframes pulse { 50% { transform: translate(-50%, -50%) scale(1.035); } }
    .stage4 .customer { left: 50%; top: 9%; }
    .stage4 .router { left: 50%; top: 28%; }
    .stage4 .law { left: 14%; top: 57%; }
    .stage4 .criminal { left: 38%; top: 57%; }
    .stage4 .rehab { left: 62%; top: 57%; }
    .stage4 .rag { left: 86%; top: 57%; }
    .stage4 .aggregator { left: 50%; top: 88%; }
    .stage5 .client { left: 15%; top: 10%; }
    .stage5 .registry { left: 84%; top: 10%; }
    .stage5 .customer { left: 35%; top: 29%; }
    .stage5 .router { left: 65%; top: 29%; }
    .stage5 .law { left: 50%; top: 49%; }
    .stage5 .criminal { left: 25%; top: 70%; }
    .stage5 .rehab { left: 75%; top: 70%; }
    .stage5 .aggregator { left: 50%; top: 91%; }
    .log { height: 338px; overflow: auto; padding: 10px; background: #070e19; }
    .trace-card { border: 1px solid #1d314b; border-radius: 9px; background: #0b1626; margin-bottom: 8px; overflow: hidden; }
    .trace-card[open] { border-color: #31577b; }
    .trace-card summary {
      display: grid; grid-template-columns: 14px 70px 145px 76px 82px 1fr 62px;
      gap: 8px; align-items: center; padding: 9px 11px; cursor: pointer;
      font: 12px/1.4 Consolas, "Courier New", monospace; list-style: none;
    }
    .trace-card summary::-webkit-details-marker { display: none; }
    .trace-card summary::before { content: "▸"; color: #58718d; }
    .trace-card[open] summary::before { content: "▾"; }
    .log-time { color: #688098; } .log-agent { color: #55c9ff; font-weight: 700; }
    .log-status { color: #ffd06e; } .log-kind { color: #c69cff; text-transform: uppercase; }
    .log-latency { color: #65e8ae; text-align: right; }
    .trace-detail { border-top: 1px solid #1d314b; padding: 10px 14px; color: #b9c9db; }
    .trace-section { margin: 8px 0; }
    .trace-label { color: #6e8dac; font: 11px Consolas, monospace; text-transform: uppercase; margin-bottom: 4px; }
    .trace-value { white-space: pre-wrap; overflow-wrap: anywhere; font: 12px/1.55 Consolas, monospace; color: #dce9f7; background: #07101c; padding: 8px; border-radius: 6px; }
    .trace-id { color: var(--muted); font: 12px Consolas, monospace; }
    .empty { color: var(--muted); padding: 30px; text-align: center; }
    @media (max-width: 1080px) {
      .grid { grid-template-columns: 1fr; }
      .right { grid-template-rows: 680px 390px; }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <h1>Multi-Agent RAG Observatory</h1>
      <div class="subtitle">Theo dõi live flow, latency và trách nhiệm của từng AI agent</div>
    </div>
    <label class="mode">Execution mode
      <select id="mode">
        <option value="stage4">Stage 4 · In-process LangGraph</option>
        <option value="stage5">Stage 5 · Distributed A2A</option>
      </select>
    </label>
  </header>

  <main class="grid">
    <section class="panel">
      <div class="panel-title"><span>Chat</span><span id="totalLatency">Ready</span></div>
      <div id="chat" class="chat">
        <div class="bubble bot">Chọn Stage 4 hoặc Stage 5, nhập câu hỏi và quan sát từng agent xử lý theo thời gian thực.</div>
      </div>
      <div class="composer">
        <textarea id="query" placeholder="Nhập câu hỏi pháp lý về ma túy..."></textarea>
        <button id="send" class="send">Gửi câu hỏi</button>
      </div>
    </section>

    <section class="right">
      <div class="panel graph-wrap">
        <div class="panel-title">
          <span id="graphTitle">Stage 4 · In-process flow</span>
          <span id="traceId" class="trace-id">No active trace</span>
        </div>
        <div id="graph" class="graph"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><span>Agent Trace Log</span><button id="clearLog">Clear</button></div>
        <div id="log" class="log"><div class="empty">Trace events sẽ xuất hiện tại đây.</div></div>
      </div>
    </section>
  </main>
</div>

<script>
const layouts = {
  stage4: {
    title: "Stage 4 · In-process LangGraph",
    nodes: [
      ["customer", "🎧", "Customer Agent"],
      ["router", "🔀", "Law Agent · Router"],
      ["law", "⚖️", "Law Agent"],
      ["criminal", "🛡️", "Criminal Agent"],
      ["rehab", "🏥", "Rehab Agent"],
      ["rag", "🔎", "RAG Agent"],
      ["aggregator", "📑", "Law Agent · Aggregator"]
    ],
    edges: [["customer","router"],["router","law"],["router","criminal"],["router","rehab"],["router","rag"],["law","aggregator"],["criminal","aggregator"],["rehab","aggregator"],["rag","aggregator"]],
    aliases: {}
  },
  stage5: {
    title: "Stage 5 · Distributed A2A",
    nodes: [
      ["client", "💬", "Web Client"],
      ["registry", "🗂️", "Service Registry :10000"],
      ["customer", "🎧", "Customer Agent :10100"],
      ["router", "🔀", "Law Agent · Router"],
      ["law", "⚖️", "Law Agent :10101"],
      ["criminal", "🛡️", "Criminal Agent :10102"],
      ["rehab", "🏥", "Rehab Agent :10103"],
      ["aggregator", "📑", "Law Agent · Aggregator"]
    ],
    edges: [["client","registry"],["client","customer"],["customer","router"],["router","law"],["law","criminal"],["law","rehab"],["criminal","aggregator"],["rehab","aggregator"],["law","aggregator"],["aggregator","client"]],
    aliases: {}
  }
};

const modeEl = document.getElementById("mode");
const graphEl = document.getElementById("graph");
const logEl = document.getElementById("log");
const chatEl = document.getElementById("chat");
const sendEl = document.getElementById("send");
const queryEl = document.getElementById("query");
let requestStarted = 0;
const agentNames = {
  client: "Web Client",
  registry: "Service Registry",
  customer: "Customer Agent",
  router: "Law Agent · Router",
  law: "Law Agent",
  criminal: "Criminal Agent",
  rehab: "Rehab Agent",
  rag: "RAG Agent",
  aggregator: "Law Agent · Aggregator",
  system: "System"
};

function renderGraph() {
  const mode = modeEl.value;
  const layout = layouts[mode];
  graphEl.className = `graph ${mode}`;
  graphEl.innerHTML = `<svg id="edges"></svg>` + layout.nodes.map(([id, icon, name]) =>
    `<div class="node ${id}" data-node="${id}"><div class="icon">${icon}</div><strong>${name}</strong><div class="state">Idle</div><div class="latency"></div></div>`
  ).join("");
  document.getElementById("graphTitle").textContent = layout.title;
  requestAnimationFrame(drawEdges);
}

function drawEdges() {
  const mode = modeEl.value;
  const svg = document.getElementById("edges");
  if (!svg) return;
  svg.innerHTML = "";
  const graphBox = graphEl.getBoundingClientRect();
  layouts[mode].edges.forEach(([from, to]) => {
    const a = graphEl.querySelector(`[data-node="${from}"]`).getBoundingClientRect();
    const b = graphEl.querySelector(`[data-node="${to}"]`).getBoundingClientRect();
    const x1 = a.left + a.width/2 - graphBox.left, y1 = a.top + a.height/2 - graphBox.top;
    const x2 = b.left + b.width/2 - graphBox.left, y2 = b.top + b.height/2 - graphBox.top;
    const bend = Math.max(35, Math.abs(y2-y1)*.42);
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${x1} ${y1} C ${x1} ${y1+bend}, ${x2} ${y2-bend}, ${x2} ${y2}`);
    path.setAttribute("class", "edge");
    path.dataset.from = from; path.dataset.to = to;
    svg.appendChild(path);
  });
}

function resetRun() {
  graphEl.querySelectorAll(".node").forEach(n => {
    n.classList.remove("running","completed","error");
    n.querySelector(".state").textContent = "Idle";
    n.querySelector(".latency").textContent = "";
  });
  graphEl.querySelectorAll(".edge").forEach(e => e.classList.remove("live"));
  logEl.innerHTML = "";
}

function nodeTargets(agent, status) {
  const alias = layouts[modeEl.value].aliases[agent];
  if (alias) {
    const nodes = alias.map(id => graphEl.querySelector(`[data-node="${id}"]`)).filter(Boolean);
    if (status === "running") {
      const idle = nodes.find(n => !n.classList.contains("completed") && !n.classList.contains("running"));
      return idle ? [idle] : nodes;
    }
    const running = nodes.find(n => n.classList.contains("running"));
    return running ? [running] : nodes;
  }
  const node = graphEl.querySelector(`[data-node="${agent}"]`);
  return node ? [node] : [];
}

function applyTrace(event) {
  const targets = nodeTargets(event.agent, event.status);
  targets.forEach(node => {
    const shouldFinish = ["output", "decision", "lifecycle"].includes(event.kind || "lifecycle");
    if (event.status === "running") {
      node.classList.remove("completed","error");
      node.classList.add("running");
    } else if (event.status === "error") {
      node.classList.remove("running","completed");
      node.classList.add("error");
    } else if (shouldFinish) {
      node.classList.remove("running","error");
      node.classList.add("completed");
    }
    const activity = event.kind === "tool" && event.tool ? `Tool: ${event.tool}` : event.message;
    node.querySelector(".state").textContent = event.status === "running" ? activity : event.status;
    if (event.latency != null) node.querySelector(".latency").textContent = `${event.latency.toFixed(3)} s`;
  });
  graphEl.querySelectorAll(".edge").forEach(edge => {
    if (edge.dataset.to === event.agent || edge.dataset.from === event.agent) {
      edge.classList.toggle("live", event.status === "running");
    }
  });
  addLog(event);
}

function addLog(e) {
  logEl.querySelector(".empty")?.remove();
  const row = document.createElement("details");
  row.className = "trace-card";
  const t = new Date((e.timestamp || Date.now()/1000)*1000).toLocaleTimeString("vi-VN", {hour12:false});
  const input = formatValue(e.tool_input);
  const output = formatValue(e.tool_output);
  const hasDetail = e.detail || input || output || e.tool;
  row.innerHTML = `
    <summary>
      <span class="log-time">${t}</span>
      <span class="log-agent">${escapeHtml(agentNames[e.agent] || e.agent || "System")}</span>
      <span class="log-kind">${escapeHtml(e.kind || "event")}</span>
      <span class="log-status">${escapeHtml(e.status || e.type)}</span>
      <span>${escapeHtml(e.message || "")}</span>
      <span class="log-latency">${e.latency != null ? e.latency.toFixed(3)+"s" : ""}</span>
    </summary>
    ${hasDetail ? `<div class="trace-detail">
      ${e.detail ? traceSection("Decision / output summary", e.detail) : ""}
      ${e.tool ? traceSection("Tool", e.tool) : ""}
      ${input ? traceSection("Tool input", input) : ""}
      ${output ? traceSection("Tool output", output) : ""}
    </div>` : ""}`;
  logEl.appendChild(row);
  logEl.scrollTop = logEl.scrollHeight;
}

function traceSection(label, value) {
  return `<div class="trace-section"><div class="trace-label">${escapeHtml(label)}</div><div class="trace-value">${escapeHtml(value)}</div></div>`;
}

function formatValue(value) {
  if (value == null || value === "") return "";
  return typeof value === "string" ? value : JSON.stringify(value, null, 2);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}

function addBubble(text, type) {
  const div = document.createElement("div");
  div.className = `bubble ${type}`;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function send() {
  const query = queryEl.value.trim();
  if (!query || sendEl.disabled) return;
  resetRun();
  addBubble(query, "user");
  queryEl.value = "";
  sendEl.disabled = true;
  sendEl.textContent = "Đang xử lý…";
  requestStarted = performance.now();
  document.getElementById("totalLatency").textContent = "Running";

  try {
    const response = await fetch("/api/chat/stream", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({query, mode: modeEl.value})
    });
    if (!response.ok) throw new Error(await response.text());
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split("\n"); buffer = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        const event = JSON.parse(line);
        if (event.type === "meta") document.getElementById("traceId").textContent = `trace ${event.trace_id.slice(0,8)}`;
        else if (event.type === "trace") applyTrace(event);
        else if (event.type === "result") addBubble(event.response, "bot");
        else if (event.type === "error") {
          addLog({agent:"system",status:"error",message:event.message,detail:event.detail,timestamp:event.timestamp});
          addBubble(`Lỗi: ${event.message}`, "bot");
        }
      }
    }
  } catch (error) {
    addBubble(`Không thể hoàn tất request: ${error.message}`, "bot");
  } finally {
    const seconds = (performance.now()-requestStarted)/1000;
    document.getElementById("totalLatency").textContent = `${seconds.toFixed(2)} s total`;
    sendEl.disabled = false;
    sendEl.textContent = "Gửi câu hỏi";
  }
}

modeEl.addEventListener("change", () => { renderGraph(); resetRun(); });
document.getElementById("clearLog").addEventListener("click", () => logEl.innerHTML = `<div class="empty">Trace log đã được xóa.</div>`);
sendEl.addEventListener("click", send);
queryEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
window.addEventListener("resize", drawEdges);
renderGraph();
</script>
</body>
</html>
